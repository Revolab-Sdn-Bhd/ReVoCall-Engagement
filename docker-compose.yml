services:
  postgres:
    image: postgres:16
    container_name: eh-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eh_test
      POSTGRES_DB: engagement_hub_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d engagement_hub_db"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - eh-pg-data:/var/lib/postgresql/data

volumes:
  eh-pg-data:
